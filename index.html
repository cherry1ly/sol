<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para solecito</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#ffeef2;
    overflow:hidden;
}

/* INICIO */
#inicio{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.heart{
    font-size:120px;
    cursor:pointer;
    background: linear-gradient(to top, #ff4d6d 0%, #ff4d6d var(--nivel), #ffccd5 var(--nivel));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* PANTALLAS */
.pantalla{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.activa{ display:flex; }

/* BURBUJAS */
.burbuja{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,105,180,0.3));
    box-shadow: inset 0 0 15px rgba(255,255,255,0.8),
                0 0 20px rgba(255,105,180,0.4);
    animation: subir linear infinite;
}

@keyframes subir{
    to{ transform:translateY(-120vh); opacity:0; }
}

/* CARTA */
.carta{
    background:linear-gradient(135deg,#fff,#ffe4ec);
    padding:20px;
    border-radius:20px;
    width:260px;
    color:#ff4d6d;
    border:2px dashed #ffb3c6;
}

/* CHAT */
.chat{
    width:300px;
    background:white;
    border-radius:20px;
    padding:10px;
}

.msg{
    background:#ff6f91;
    color:white;
    padding:8px;
    border-radius:15px;
    margin:5px;
    width:fit-content;
}

.typing{
    color:#888;
    font-size:0.9em;
}

/* BOTON */
button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff6f91;
    color:white;
    cursor:pointer;
}

/* BOTON NO */
.no{
    position:absolute;
}

/* IMGS */
.conejos{ width:200px; border-radius:20px; }
.gato{ width:140px; }

.final{
    font-size:1.5em;
    color:#ff4d6d;
}
</style>
</head>

<body>

<audio id="sonido" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>

<!-- INICIO -->
<div id="inicio">
    <h2 style="color:#ff6f91;">Toca el corazón 💖</h2>
    <div id="heart" class="heart">❤</div>
</div>

<!-- BURBUJAS -->
<div id="p1" class="pantalla">
    <h2 style="color:#ff6f91;">Entrando a mi mundo contigo </h2>
    <button onclick="next(2)">Siguienteeee </button>
</div>

<!-- CONEJOS -->
<div id="p2" class="pantalla">
    <img class="conejos" src="https://i.pinimg.com/736x/96/a4/c7/96a4c7601836a5ef751491d95b710f3d.jpg">
    <div class="carta">
        Mi solecito <br><br>
        Eres lo más bonito que tengo, te quiero muchoooo<br><br>
        eres el mas bonito mi vida, gracias por estar conmigo, muack 
    </div>
    <button onclick="next(3)">Siguiente 💌</button>
</div>

<!-- CHAT -->
<div id="p3" class="pantalla">
    <div class="chat" id="chat"></div>
    <div class="typing" id="typing">escribiendo...</div>
    <button onclick="next(4)">Siguiente, osiosi </button>
</div>

<!-- GATO -->
<div id="p4" class="pantalla">
    <img class="gato" src="https://i.pinimg.com/originals/e1/43/92/e14392b3bb9f745025a5cf6a9abe11be.gif">
    <p style="color:#ff4d6d;">yo al ver tu carita preciosa uwu 💖</p>
    <button onclick="next(5)">Final :c </button>
</div>

<!-- FINAL -->
<div id="p5" class="pantalla">
    <div class="final">
        💖 <span id="nombre"></span> <br><br>
        ¿Te quedas conmigo para siempre? 
    </div>

    <button id="btnSi">Siuuu 💞</button>
    <button class="no" onmouseover="mover(this)">Nop </button>
</div>

<script>
let nombre = "Ositooo"; // 👉 ositooo

/* CORAZON */
let nivel=0;
let heart=document.getElementById("heart");

heart.onclick=()=>{
    nivel+=20;
    heart.style.setProperty('--nivel', nivel+"%");
    if(nivel>=100){
        document.getElementById("inicio").style.display="none";
        next(1);
        burbujas();
        iniciarChat();
    }
};

/* CAMBIO */
function next(n){
    document.querySelectorAll(".pantalla").forEach(p=>p.classList.remove("activa"));
    document.getElementById("p"+n).classList.add("activa");

    if(n==5){
        animarNombre();
    }
}

/* BURBUJAS */
function burbujas(){
    setInterval(()=>{
        let b=document.createElement("div");
        b.className="burbuja";
        let size=20+Math.random()*120;
        b.style.width=size+"px";
        b.style.height=size+"px";
        b.style.left=Math.random()*100+"vw";
        b.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),8000);
    },80);
}

/* CHAT REAL */
let mensajes=[
"Holiii ",
"Estaba pensando en ti ",
"Y quería decirte algo...",
"Te quiero muchísimooooo ",
"Eres el mas hermoso",
"te extraño",
"me gusta estar contigo",

];

function iniciarChat(){
    let chat=document.getElementById("chat");
    let typing=document.getElementById("typing");
    let sonido=document.getElementById("sonido");
    let i=0;

    function escribirMensaje(texto, callback){
        typing.style.display="block";

        setTimeout(()=>{
            typing.style.display="none";

            let div=document.createElement("div");
            div.className="msg";
            chat.appendChild(div);

            let j=0;
            function escribir(){
                if(j<texto.length){
                    div.innerHTML += texto[j];
                    j++;
                    setTimeout(escribir,40);
                }else{
                    sonido.play();
                    setTimeout(callback,900);
                }
            }
            escribir();
        },1200);
    }

    function siguiente(){
        if(i<mensajes.length){
            escribirMensaje(mensajes[i], ()=>{
                i++;
                siguiente();
            });
        }
    }

    siguiente();
}

/* NOMBRE ANIMADO */
function animarNombre(){
    let cont=document.getElementById("nombre");
    cont.innerHTML="";
    let i=0;

    function escribir(){
        if(i<nombre.length){
            cont.innerHTML+=nombre[i];
            i++;
            setTimeout(escribir,120);
        }
    }
    escribir();
}

/* VIBRAR */
function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }
}

/* EXPLOSION CORAZONES */
function explosion(){
    for(let i=0;i<40;i++){
        let c=document.createElement("div");
        c.innerHTML="💖";
        c.style.position="fixed";
        c.style.left="50%";
        c.style.top="50%";
        c.style.fontSize="20px";

        let x=(Math.random()-0.5)*600;
        let y=(Math.random()-0.5)*600;

        c.style.transition="1s";
        document.body.appendChild(c);

        setTimeout(()=>{
            c.style.transform=`translate(${x}px,${y}px)`;
            c.style.opacity="0";
        },10);

        setTimeout(()=>c.remove(),1000);
    }
}

/* BOTON SI */
document.getElementById("btnSi").onclick=function(){
    this.innerText="te quiero mucho mucho mucho 💖";
    vibrar();
    explosion();
};

/* BOTON NO */
function mover(btn){
    btn.style.top=Math.random()*80+"vh";
    btn.style.left=Math.random()*80+"vw";
}
</script>

</body>
</html>
